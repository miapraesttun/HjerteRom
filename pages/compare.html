<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sammenlign – HjerteRom</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Hjerte<span>Rom</span></a>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link text-white" href="home.html">
              <i class="bi bi-house-heart-fill me-1"></i>Hjem
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white active" href="compare.html">
              <i class="bi bi-bar-chart-fill me-1"></i>Sammenlign
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <h2 class="hr-page-title mt-3">Sammenlign byer</h2>
      <p class="hr-page-subtitle">Velg to byer for å sammenligne dem side ved side.</p>

      <!-- City selectors -->
      <div class="row g-3 mb-4">
        <div class="col-md-5">
          <label class="form-label fw-semibold">By 1</label>
          <select id="city-a" class="form-select">
            <option value="">Velg by …</option>
          </select>
        </div>
        <div class="col-md-2 d-flex align-items-end justify-content-center pb-1">
          <i class="bi bi-arrow-left-right text-muted" style="font-size: 1.5rem;"></i>
        </div>
        <div class="col-md-5">
          <label class="form-label fw-semibold">By 2</label>
          <select id="city-b" class="form-select">
            <option value="">Velg by …</option>
          </select>
        </div>
      </div>

      <!-- Comparison table -->
      <div id="compare-result"></div>
    </div>
  </main>

  <footer>
    <div class="container">© 2025 HjerteRom</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { getCities } from "../js/dataService.js";
    import { rankCities } from "../js/recommendation.js";

    let citiesData = [];

    function renderComparison(cityA, cityB) {
      const container = document.getElementById("compare-result");

      if (!cityA || !cityB) {
        container.innerHTML = "";
        return;
      }

      const rows = [
        { label: "Fylke", key: "county" },
        { label: "Helsescore", key: "healthScore" },
        { label: "Aktivitetsscore", key: "activitiesScore" },
        { label: "Omsorgsscore", key: "careScore" },
        { label: "Mobilitetstilbud", fn: (c) => (c.mobility || []).join(", ") },
        { label: "Tags", fn: (c) => (c.tags || []).join(", ") },
        { label: "Match-score", key: "score" },
      ];

      const tableRows = rows
        .map(({ label, key, fn }) => {
          const valA = fn ? fn(cityA) : cityA[key] ?? "–";
          const valB = fn ? fn(cityB) : cityB[key] ?? "–";
          const highlight =
            typeof valA === "number" && typeof valB === "number"
              ? valA > valB
                ? "table-success"
                : valA < valB
                ? "table-danger"
                : ""
              : "";

          return `
            <tr>
              <td class="fw-semibold">${label}</td>
              <td class="${highlight}">${valA}</td>
              <td class="${valA === valB ? "" : highlight === "table-success" ? "table-danger" : highlight === "table-danger" ? "table-success" : ""}">${valB}</td>
            </tr>
          `;
        })
        .join("");

      container.innerHTML = `
        <div class="table-responsive">
          <table class="table table-bordered align-middle">
            <thead class="table-dark">
              <tr>
                <th></th>
                <th>${cityA.name}</th>
                <th>${cityB.name}</th>
              </tr>
            </thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>
        <div class="d-flex gap-3 mt-3">
          <a href="city.html?id=${cityA.id}" class="btn btn-outline-primary btn-sm">
            Vis ${cityA.name} <i class="bi bi-arrow-right ms-1"></i>
          </a>
          <a href="city.html?id=${cityB.id}" class="btn btn-outline-primary btn-sm">
            Vis ${cityB.name} <i class="bi bi-arrow-right ms-1"></i>
          </a>
        </div>
      `;
    }

    async function init() {
      try {
        const cities = await getCities();
        citiesData = rankCities(cities);

        const selectA = document.getElementById("city-a");
        const selectB = document.getElementById("city-b");

        citiesData.forEach((city) => {
          const optA = new Option(city.name, city.id);
          const optB = new Option(city.name, city.id);
          selectA.appendChild(optA);
          selectB.appendChild(optB);
        });

        function onChange() {
          const a = citiesData.find((c) => c.id === selectA.value) || null;
          const b = citiesData.find((c) => c.id === selectB.value) || null;
          renderComparison(a, b);
        }

        selectA.addEventListener("change", onChange);
        selectB.addEventListener("change", onChange);
      } catch (err) {
        console.error(err);
        document.getElementById("compare-result").innerHTML =
          '<p class="text-danger">Kunne ikke laste data.</p>';
      }
    }

    init();
  </script>
</body>
</html>
