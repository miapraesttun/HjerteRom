<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aktiviteter – HjerteRom</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Hjerte<span>Rom</span></a>
      <div class="ms-auto">
        <a class="nav-link text-white" href="javascript:history.back()">
          <i class="bi bi-arrow-left me-1"></i>Tilbake
        </a>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <h2 class="hr-page-title mt-3">Aktiviteter</h2>
      <p class="hr-page-subtitle">Aktiviteter tilpasset dine interesser og mobilitet.</p>

      <!-- Filters -->
      <div id="filter-container"></div>

      <!-- Activity list -->
      <div id="activities-container">
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">© 2025 HjerteRom</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { getActivities } from "../js/dataService.js";
    import { filterActivities } from "../js/recommendation.js";
    import { createActivityCard } from "../js/components/cards.js";
    import { createList } from "../js/components/lists.js";
    import { createFilterBar } from "../js/components/filters.js";

    const params = new URLSearchParams(window.location.search);
    const cityId = params.get("cityId") || null;

    let allActivities = [];
    let activeFilters = {};

    function renderActivities(activities) {
      const container = document.getElementById("activities-container");
      container.innerHTML = "";
      const list = createList(
        activities,
        (act) => createActivityCard(act),
        "Ingen aktiviteter funnet med de valgte filtrene."
      );
      container.appendChild(list);
    }

    function applyFilters() {
      let filtered = filterActivities(allActivities);

      if (activeFilters.type) {
        filtered = filtered.filter((a) => a.type === activeFilters.type);
      }
      if (activeFilters.mobility) {
        filtered = filtered.filter(
          (a) => !a.mobility || a.mobility.includes(activeFilters.mobility)
        );
      }

      renderActivities(filtered);
    }

    async function init() {
      try {
        allActivities = await getActivities(cityId);

        // Build filter bar
        const filterBar = createFilterBar({
          filters: [
            {
              label: "Type",
              key: "type",
              options: [
                { label: "Natur", value: "natur" },
                { label: "Kultur", value: "kultur" },
                { label: "Sosialt", value: "sosialt" },
              ],
            },
            {
              label: "Mobilitet",
              key: "mobility",
              options: [
                { label: "God", value: "god" },
                { label: "Begrenset", value: "begrenset" },
                { label: "Rullestol", value: "rullestol" },
              ],
            },
          ],
          onChange(filters) {
            activeFilters = filters;
            applyFilters();
          },
        });
        document.getElementById("filter-container").appendChild(filterBar);

        applyFilters();
      } catch (err) {
        console.error(err);
        document.getElementById("activities-container").innerHTML =
          '<p class="text-danger text-center">Kunne ikke laste aktiviteter.</p>';
      }
    }

    init();
  </script>
</body>
</html>
