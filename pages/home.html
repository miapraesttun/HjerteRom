<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hjem – HjerteRom</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Hjerte<span>Rom</span></a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link text-white active" href="home.html">
              <i class="bi bi-house-heart-fill me-1"></i>Hjem
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white" href="preferences.html">
              <i class="bi bi-sliders me-1"></i>Preferanser
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white" href="compare.html">
              <i class="bi bi-bar-chart-fill me-1"></i>Sammenlign
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <div class="hr-hero">
    <div class="container">
      <h1 id="greeting">Anbefalte byer</h1>
      <p class="lead" id="hero-subtitle">
        Basert på dine preferanser har vi rangert disse byene for deg.
      </p>
    </div>
  </div>

  <main>
    <div class="container">

      <!-- Loading / error state -->
      <div id="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Laster …</span>
        </div>
      </div>

      <!-- Results -->
      <div id="cities-container" class="row g-3" style="display:none!important;"></div>

      <!-- No results -->
      <p id="no-results" class="text-center text-muted py-5" style="display:none!important;">
        Ingen byer funnet med de valgte preferansene.
        <a href="preferences.html">Endre preferanser</a>
      </p>

    </div>
  </main>

  <footer>
    <div class="container">© 2025 HjerteRom</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { getState } from "../js/state.js";
    import { getCities } from "../js/dataService.js";
    import { rankCities } from "../js/recommendation.js";
    import { createCityCard } from "../js/components/cards.js";

    async function init() {
      const state = getState();

      // Redirect if onboarding not complete
      if (!state.onboardingComplete) {
        window.location.href = "onboarding.html";
        return;
      }

      try {
        const cities = await getCities();
        const ranked = rankCities(cities);

        document.getElementById("loading").style.display = "none";

        if (ranked.length === 0) {
          document.getElementById("no-results").style.removeProperty("display");
          return;
        }

        const container = document.getElementById("cities-container");
        container.style.removeProperty("display");

        ranked.forEach((city) => {
          const card = createCityCard(city, (selected) => {
            sessionStorage.setItem("selectedCity", JSON.stringify(selected));
            window.location.href = `city.html?id=${selected.id}`;
          });
          container.appendChild(card);
        });
      } catch (err) {
        console.error(err);
        document.getElementById("loading").innerHTML =
          '<p class="text-danger">Kunne ikke laste data. Prøv igjen.</p>';
      }
    }

    init();
  </script>
</body>
</html>
