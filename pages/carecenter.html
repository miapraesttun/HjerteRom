<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omsorgssentre – HjerteRom</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Hjerte<span>Rom</span></a>
      <div class="ms-auto">
        <a class="nav-link text-white" href="javascript:history.back()">
          <i class="bi bi-arrow-left me-1"></i>Tilbake
        </a>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <h2 class="hr-page-title mt-3">Omsorgssentre</h2>
      <p class="hr-page-subtitle" id="page-subtitle">Liste over omsorgssentre.</p>

      <!-- Sort bar -->
      <div id="sort-container"></div>

      <!-- Filter bar -->
      <div id="filter-container"></div>

      <!-- Care center list -->
      <div id="carecenters-container">
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">© 2025 HjerteRom</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { getCareCentersWithRatings } from "../js/dataService.js";
    import { rankCareCenters } from "../js/recommendation.js";
    import { createCareCenterCard } from "../js/components/cards.js";
    import { createList } from "../js/components/lists.js";
    import { createFilterBar, createSortDropdown } from "../js/components/filters.js";

    const params = new URLSearchParams(window.location.search);
    const cityId = params.get("cityId") || null;

    let allCenters = [];
    let activeFilters = {};
    let sortBy = "score";

    function renderCenters(centers) {
      const container = document.getElementById("carecenters-container");
      container.innerHTML = "";
      const list = createList(
        centers,
        (c) => createCareCenterCard(c, (selected) => {
          window.location.href = `carecenter.html?id=${selected.id}`;
        }),
        "Ingen omsorgssentre funnet med de valgte filtrene."
      );
      container.appendChild(list);
    }

    function applyFiltersAndSort() {
      let result = [...allCenters];

      // Filter by mobility
      if (activeFilters.mobility) {
        result = result.filter(
          (c) => !c.mobility || c.mobility.includes(activeFilters.mobility)
        );
      }

      // Filter by specialization
      if (activeFilters.specialization) {
        result = result.filter(
          (c) => c.specializations && c.specializations.includes(activeFilters.specialization)
        );
      }

      // Sort
      result.sort((a, b) => {
        if (sortBy === "score") return (b.score || 0) - (a.score || 0);
        if (sortBy === "rating") return ((b.rating && b.rating.overall) || 0) - ((a.rating && a.rating.overall) || 0);
        if (sortBy === "name") return a.name.localeCompare(b.name, "no");
        return 0;
      });

      renderCenters(result);
    }

    async function init() {
      try {
        const raw = await getCareCentersWithRatings(cityId);
        allCenters = rankCareCenters(raw);

        if (cityId) {
          document.getElementById("page-subtitle").textContent =
            `Viser omsorgssentre i valgt by, rangert etter dine preferanser.`;
        }

        // Sort dropdown
        const sortBar = createSortDropdown(
          [
            { label: "Best match", value: "score" },
            { label: "Høyest vurdering", value: "rating" },
            { label: "Navn A–Å", value: "name" },
          ],
          (val) => {
            sortBy = val;
            applyFiltersAndSort();
          }
        );
        document.getElementById("sort-container").appendChild(sortBar);

        // Filter bar
        const filterBar = createFilterBar({
          filters: [
            {
              label: "Mobilitet",
              key: "mobility",
              options: [
                { label: "God", value: "god" },
                { label: "Begrenset", value: "begrenset" },
                { label: "Rullestol", value: "rullestol" },
              ],
            },
            {
              label: "Spesialisering",
              key: "specialization",
              options: [
                { label: "Demens", value: "demens" },
                { label: "Rehabilitering", value: "rehabilitering" },
                { label: "Palliativ", value: "palliativ" },
                { label: "Korttidsopphold", value: "korttidsopphold" },
              ],
            },
          ],
          onChange(filters) {
            activeFilters = filters;
            applyFiltersAndSort();
          },
        });
        document.getElementById("filter-container").appendChild(filterBar);

        applyFiltersAndSort();
      } catch (err) {
        console.error(err);
        document.getElementById("carecenters-container").innerHTML =
          '<p class="text-danger text-center">Kunne ikke laste omsorgssentre.</p>';
      }
    }

    init();
  </script>
</body>
</html>
