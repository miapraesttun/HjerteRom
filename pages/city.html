<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>By – HjerteRom</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Hjerte<span>Rom</span></a>
      <div class="ms-auto">
        <a class="nav-link text-white" href="home.html">
          <i class="bi bi-arrow-left me-1"></i>Tilbake
        </a>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">

      <!-- City header -->
      <div id="city-header" class="py-4">
        <div id="city-loading" class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
        </div>
      </div>

      <!-- Tabs -->
      <ul class="nav nav-tabs mb-4" id="cityTabs">
        <li class="nav-item">
          <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-carecenters">
            <i class="bi bi-building-heart me-1"></i>Omsorgssentre
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-activities">
            <i class="bi bi-activity me-1"></i>Aktiviteter
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-map">
            <i class="bi bi-map me-1"></i>Kart
          </button>
        </li>
      </ul>

      <div class="tab-content">

        <!-- Care centers tab -->
        <div class="tab-pane fade show active" id="tab-carecenters">
          <div id="carecenters-container"></div>
        </div>

        <!-- Activities tab -->
        <div class="tab-pane fade" id="tab-activities">
          <div id="activities-container"></div>
        </div>

        <!-- Map tab -->
        <div class="tab-pane fade" id="tab-map">
          <div id="hr-map" class="mt-2"></div>
          <p class="small text-muted mt-2">
            <i class="bi bi-info-circle me-1"></i>
            Kartet krever en gyldig Google Maps API-nøkkel satt i <code>config.js</code>.
          </p>
        </div>

      </div>
    </div>
  </main>

  <footer>
    <div class="container">© 2025 HjerteRom</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { getCities, getActivities, getCareCentersWithRatings } from "../js/dataService.js";
    import { rankCareCenters, filterActivities } from "../js/recommendation.js";
    import { createCareCenterCard } from "../js/components/cards.js";
    import { createActivityCard } from "../js/components/cards.js";
    import { createList } from "../js/components/lists.js";

    const params = new URLSearchParams(window.location.search);
    const cityId = params.get("id");

    async function init() {
      if (!cityId) {
        window.location.href = "home.html";
        return;
      }

      try {
        const [cities, centers, activities] = await Promise.all([
          getCities(),
          getCareCentersWithRatings(cityId),
          getActivities(cityId),
        ]);

        const city = cities.find((c) => c.id === cityId);
        if (!city) {
          window.location.href = "home.html";
          return;
        }

        // Render city header
        document.getElementById("city-loading").remove();
        document.getElementById("city-header").innerHTML = `
          <h2 class="hr-page-title">
            <i class="bi bi-geo-alt-fill text-primary me-2"></i>${city.name}
          </h2>
          <p class="text-muted">${city.county} &bull; ${city.description}</p>
          <div class="d-flex gap-3 flex-wrap">
            <span><i class="bi bi-heart-pulse text-danger me-1"></i>Helse: ${city.healthScore}/10</span>
            <span><i class="bi bi-activity text-success me-1"></i>Aktivitet: ${city.activitiesScore}/10</span>
            <span><i class="bi bi-building-heart text-primary me-1"></i>Omsorg: ${city.careScore}/10</span>
          </div>
        `;

        // Render care centers
        const rankedCenters = rankCareCenters(centers);
        const ccList = createList(
          rankedCenters,
          (center) =>
            createCareCenterCard(center, (selected) => {
              window.location.href = `carecenter.html?id=${selected.id}`;
            }),
          "Ingen omsorgssentre funnet for denne byen."
        );
        document.getElementById("carecenters-container").appendChild(ccList);

        // Render activities
        const filteredActivities = filterActivities(activities);
        const actList = createList(
          filteredActivities,
          (act) => createActivityCard(act),
          "Ingen aktiviteter funnet for dine preferanser."
        );
        document.getElementById("activities-container").appendChild(actList);

      } catch (err) {
        console.error(err);
        document.getElementById("city-header").innerHTML =
          '<p class="text-danger">Kunne ikke laste data. Prøv igjen.</p>';
      }
    }

    init();
  </script>
</body>
</html>
