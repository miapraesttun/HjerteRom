<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preferanser – HjerteRom</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Hjerte<span>Rom</span></a>
    </div>
  </nav>

  <main>
    <div class="container" style="max-width: 720px;">

      <!-- Stepper -->
      <div class="hr-stepper mt-3">
        <div class="hr-step done">1</div>
        <div class="hr-step-line done"></div>
        <div class="hr-step active">2</div>
        <div class="hr-step-line"></div>
        <div class="hr-step">3</div>
      </div>

      <h2 class="hr-page-title">Dine preferanser</h2>
      <p class="hr-page-subtitle">
        Fyll inn informasjon om personen søket gjelder. Jo mer du fyller inn, desto bedre anbefalinger.
      </p>

      <form id="preferences-form" novalidate>

        <!-- Age -->
        <div class="mb-4">
          <label for="age" class="form-label fw-semibold">Alder</label>
          <input
            type="number"
            id="age"
            name="age"
            class="form-control"
            min="0"
            max="120"
            placeholder="F.eks. 78"
          />
        </div>

        <!-- County -->
        <div class="mb-4">
          <label class="form-label fw-semibold">Foretrukket fylke</label>
          <div id="county-chips" class="d-flex flex-wrap gap-2">
            <!-- chips inserted by JS -->
          </div>
        </div>

        <!-- Mobility -->
        <div class="mb-4">
          <label class="form-label fw-semibold">Mobilitet</label>
          <div class="d-flex flex-wrap gap-2" id="mobility-chips">
            <!-- chips inserted by JS -->
          </div>
        </div>

        <!-- Interests -->
        <div class="mb-4">
          <label class="form-label fw-semibold">Interesser</label>
          <div id="interest-chips" class="d-flex flex-wrap gap-2">
            <!-- chips inserted by JS -->
          </div>
        </div>

        <!-- Priorities -->
        <div class="mb-4">
          <label class="form-label fw-semibold">Prioriteringer</label>
          <p class="small text-muted mb-2" id="priority-hint">Velg opp til 3</p>
          <div id="priority-chips" class="d-flex flex-wrap gap-2">
            <!-- chips inserted by JS -->
          </div>
        </div>

        <div class="d-flex justify-content-between">
          <a href="onboarding.html" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i> Tilbake
          </a>
          <button type="submit" class="btn btn-primary px-4">
            Se anbefalinger <i class="bi bi-arrow-right ms-1"></i>
          </button>
        </div>

      </form>
    </div>
  </main>

  <footer>
    <div class="container">© 2025 HjerteRom</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { getState, setState } from "../js/state.js";
    import { createChipButton } from "../js/components/buttons.js";
    import { AGE_MIN, AGE_MAX, MAX_PRIORITIES } from "../js/state.js";

    const counties = ["Oslo", "Vestland", "Rogaland", "Trøndelag", "Agder", "Viken", "Innlandet"];
    const mobilityOptions = [
      { label: "God mobilitet", value: "god" },
      { label: "Begrenset mobilitet", value: "begrenset" },
      { label: "Rullestolbruker", value: "rullestol" },
    ];
    const interests = [
      { label: "🌿 Natur", value: "natur" },
      { label: "🎨 Kultur", value: "kultur" },
      { label: "🤝 Sosialt", value: "sosialt" },
    ];
    const priorities = [
      { label: "Nærhet til familie", value: "nærhet_til_familie" },
      { label: "Helsestilbud", value: "helsestilbud" },
      { label: "Aktivitetstilbud", value: "aktivitetstilbud" },
    ];

    const state = getState();
    const selectedCounties = new Set(state.counties || []);
    let selectedMobility = state.mobility || null;
    const selectedInterests = new Set(state.interests || []);
    const selectedPriorities = new Set(state.priorities || []);

    // Apply constants to DOM
    const ageInput = document.getElementById("age");
    ageInput.min = AGE_MIN;
    ageInput.max = AGE_MAX;
    document.getElementById("priority-hint").textContent = `Velg opp til ${MAX_PRIORITIES}`;

    // County chips
    counties.forEach((county) => {
      const chip = createChipButton(county, county, (val, active) => {
        active ? selectedCounties.add(val) : selectedCounties.delete(val);
      });
      if (selectedCounties.has(county)) chip.classList.add("active");
      document.getElementById("county-chips").appendChild(chip);
    });

    // Mobility chips (single-select)
    mobilityOptions.forEach(({ label, value }) => {
      const chip = createChipButton(label, value, (val) => {
        document.querySelectorAll("#mobility-chips .hr-chip").forEach((c) => c.classList.remove("active"));
        selectedMobility = val;
        chip.classList.add("active");
      });
      if (selectedMobility === value) chip.classList.add("active");
      document.getElementById("mobility-chips").appendChild(chip);
    });

    // Interest chips
    interests.forEach(({ label, value }) => {
      const chip = createChipButton(label, value, (val, active) => {
        active ? selectedInterests.add(val) : selectedInterests.delete(val);
      });
      if (selectedInterests.has(value)) chip.classList.add("active");
      document.getElementById("interest-chips").appendChild(chip);
    });

    // Priority chips (max MAX_PRIORITIES)
    priorities.forEach(({ label, value }) => {
      const chip = createChipButton(label, value, (val, active) => {
        if (active && selectedPriorities.size >= MAX_PRIORITIES) {
          chip.classList.remove("active");
          return;
        }
        active ? selectedPriorities.add(val) : selectedPriorities.delete(val);
      });
      if (selectedPriorities.has(value)) chip.classList.add("active");
      document.getElementById("priority-chips").appendChild(chip);
    });

    // Pre-fill age
    if (state.age) document.getElementById("age").value = state.age;

    // Form submit
    document.getElementById("preferences-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const age = parseInt(document.getElementById("age").value, 10) || null;

      setState({
        age,
        counties: [...selectedCounties],
        mobility: selectedMobility,
        interests: [...selectedInterests],
        priorities: [...selectedPriorities],
        onboardingComplete: true,
      });

      window.location.href = "home.html";
    });
  </script>
</body>
</html>
